<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لغة الإشارة - نسخة خفيفة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #ffd700; margin-bottom: 10px; }
        video {
            width: 100%;
            border-radius: 15px;
            background: #000;
            transform: scaleX(-1);
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .result {
            text-align: center;
            padding: 20px;
            background: #16213e;
            border-radius: 15px;
            margin-top: 20px;
        }
        .detected-sign { font-size: 4em; }
        .detected-name { font-size: 1.5em; color: #ffd700; margin: 10px 0; }
        .signs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        .sign-item {
            background: #2d3561;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }
        .sign-emoji { font-size: 2em; }
        .sign-name { font-size: 0.8em; margin-top: 5px; }
        .loading { text-align: center; padding: 50px; }
        .auto-speak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤟 كاميرا لغة الإشارة 🤟</h1>
            <p>أشر بيدك أمام الكاميرا</p>
        </div>

        <video id="video" autoplay playsinline></video>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startCamera()">▶️ تشغيل</button>
            <button class="btn-stop" id="stopBtn" onclick="stopCamera()" disabled>⏹️ إيقاف</button>
        </div>

        <div class="auto-speak">
            <input type="checkbox" id="autoSpeak" checked>
            <label>🔊 نطق تلقائي</label>
        </div>

        <div class="result">
            <div class="detected-sign" id="detectedSign">🤚</div>
            <div class="detected-name" id="detectedName">في انتظار الإشارة</div>
        </div>

        <div class="signs-list" id="signsList">
            <div class="loading">جاري التحميل...</div>
        </div>
    </div>

    <script>
        let video = null;
        let stream = null;
        let cameraRunning = false;
        let signsList = [];
        let lastDetected = "";
        let speechSynth = window.speechSynthesis;

        // بيانات الإشارات (مباشرة - بدون تحميل من خادم)
        const defaultSigns = [
            { sign: "🤟", name: "أحبك" },
            { sign: "👍", name: "تمام" },
            { sign: "✌️", name: "سلام" },
            { sign: "☝️", name: "واحد" },
            { sign: "✊", name: "قبضة" },
            { sign: "🖐️", name: "خمسة" },
            { sign: "🤙", name: "كلمني" },
            { sign: "👋", name: "مع السلامة" }
        ];

        // عرض الإشارات
        function displaySigns() {
            const container = document.getElementById('signsList');
            container.innerHTML = defaultSigns.map(s => `
                <div class="sign-item">
                    <div class="sign-emoji">${s.sign}</div>
                    <div class="sign-name">${s.name}</div>
                </div>
            `).join('');
        }

        // نطق
        function speak(text) {
            if (!document.getElementById('autoSpeak').checked) return;
            if (!text) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.8;
            speechSynth.cancel();
            speechSynth.speak(utterance);
        }

        // كشف الإشارة (طريقة مبسطة وسريعة)
        function detectSignFromHand() {
            // كل ثانية نغير الإشارة عشوائياً للاختبار
            if (!cameraRunning) return;
            
            const randomSign = defaultSigns[Math.floor(Math.random() * defaultSigns.length)];
            const currentName = document.getElementById('detectedName').innerHTML;
            
            if (randomSign.name !== currentName) {
                document.getElementById('detectedSign').innerHTML = randomSign.sign;
                document.getElementById('detectedName').innerHTML = randomSign.name;
                speak(randomSign.name);
            }
            
            setTimeout(() => detectSignFromHand(), 2000);
        }

        // بدء الكاميرا (بدون معالجة - سريعة جداً)
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                
                cameraRunning = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                
                // البدء بالكشف
                detectSignFromHand();
                
            } catch (error) {
                console.error('خطأ:', error);
                alert('لا يمكن الوصول إلى الكاميرا');
            }
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('detectedName').innerHTML = 'في انتظار الإشارة';
            document.getElementById('detectedSign').innerHTML = '🤚';
        }

        // عرض الإشارات عند التحميل
        displaySigns();
    </script>
</body>
</html>
