<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لغة الإشارة العربية - كاميرا ذكية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .header p {
            color: #ccc;
            font-size: 1.1em;
        }

        /* Video Section */
        .video-section {
            background: #0f0f1a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        video, #video {
            width: 100%;
            height: auto;
            transform: scaleX(-1);
            border-radius: 15px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: #2ecc71;
            color: white;
        }

        .btn-stop {
            background: #e74c3c;
            color: white;
        }

        .btn-speak {
            background: #3498db;
            color: white;
        }

        /* Result Section */
        .result-section {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .detected-sign {
            font-size: 4em;
            margin: 10px 0;
        }

        .detected-name {
            font-size: 1.8em;
            color: #ffd700;
            margin: 10px 0;
        }

        .detected-meaning {
            font-size: 1.2em;
            color: #ccc;
        }

        /* Signs Grid */
        .signs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .sign-card {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #2d3561;
        }

        .sign-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            background: #2d3561;
        }

        .sign-emoji {
            font-size: 3em;
        }

        .sign-name {
            font-size: 1.1em;
            margin: 10px 0 5px;
            color: #ffd700;
        }

        .sign-meaning {
            font-size: 0.9em;
            color: #aaa;
        }

        /* Search */
        .search-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            background: #2d3561;
            color: white;
            margin-bottom: 20px;
        }

        .search-box::placeholder {
            color: #888;
        }

        /* Auto Speak Toggle */
        .auto-speak {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .auto-speak input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            color: #ffd700;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #2d3561;
            color: white;
            padding: 10px 25px;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #1a1a2e;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .detected-name {
                font-size: 1.2em;
            }
            
            button {
                padding: 8px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤟 كاميرا لغة الإشارة العربية 🤟</h1>
            <p>أشر بيدك أمام الكاميرا - سيتم التعرف على الإشارة ونطقها فوراً</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('camera')">📷 الكاميرا</button>
            <button class="tab-btn" onclick="switchTab('learn')">📚 تعلم الإشارات</button>
            <button class="tab-btn" onclick="switchTab('train')">🎯 تدريب</button>
        </div>

        <!-- تبويب الكاميرا -->
        <div id="camera-tab" class="tab-content active">
            <div class="video-section">
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>

                <div class="controls">
                    <button class="btn-start" id="startBtn" onclick="startCamera()">▶️ تشغيل الكاميرا</button>
                    <button class="btn-stop" id="stopBtn" onclick="stopCamera()" disabled>⏹️ إيقاف الكاميرا</button>
                    <button class="btn-speak" id="speakBtn" onclick="speakDetected()" disabled>🔊 نطق الإشارة</button>
                </div>

                <div class="auto-speak">
                    <input type="checkbox" id="autoSpeak" checked>
                    <label for="autoSpeak">🔊 نطق تلقائي (ينطق الإشارة فور اكتشافها)</label>
                </div>
            </div>

            <div class="result-section">
                <h3>🖐️ الإشارة المكتشفة</h3>
                <div class="detected-sign" id="detectedSign">🤚</div>
                <div class="detected-name" id="detectedName">في انتظار الإشارة</div>
                <div class="detected-meaning" id="detectedMeaning"></div>
            </div>
        </div>

        <!-- تبويب تعلم الإشارات -->
        <div id="learn-tab" class="tab-content">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 ابحث عن إشارة...">
            <div id="signsGrid" class="signs-grid">
                <div class="loading">جاري تحميل الإشارات...</div>
            </div>
        </div>

        <!-- تبويب التدريب -->
        <div id="train-tab" class="tab-content">
            <div class="result-section">
                <h3>🎯 اختبار معرفتك</h3>
                <div class="detected-sign" id="quizSign">❓</div>
                <div class="detected-name" id="quizQuestion">ما هي هذه الإشارة؟</div>
                
                <input type="text" id="quizAnswer" placeholder="اكتب إجابتك هنا..." 
                       style="width: 80%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; font-size: 1em;">
                
                <div class="controls">
                    <button onclick="newQuiz()">🎲 سؤال جديد</button>
                    <button onclick="checkQuiz()">✅ تحقق</button>
                </div>
                
                <div id="quizResult" style="margin-top: 15px; font-size: 1.2em;"></div>
                <div id="quizScore" style="margin-top: 15px; color: #ffd700;">⭐ النقاط: 0 / 0 (0%)</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>

    <script>
        let video = null;
        let canvas = null;
        let ctx = null;
        let stream = null;
        let cameraRunning = false;
        let handModel = null;
        let signsList = [];
        let quizScore = 0;
        let quizTotal = 0;
        let currentQuizSign = null;
        let speechSynthesis = window.speechSynthesis;

        // تحميل البيانات من API
        async function loadSigns() {
            try {
                const response = await fetch('/api/signs');
                signsList = await response.json();
                displaySigns(signsList);
                console.log(`✅ تم تحميل ${signsList.length} إشارة`);
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                // بيانات افتراضية
                signsList = [
                    { sign: "🤟", name: "أحبك", meaning: "I Love You", description: "مد الإبهام والسبابة والخنصر" },
                    { sign: "👍", name: "تمام", meaning: "Good", description: "رفع الإبهام" },
                    { sign: "✌️", name: "سلام", meaning: "Peace", description: "رفع السبابة والوسطى" }
                ];
                displaySigns(signsList);
            }
        }

        // عرض الإشارات
        function displaySigns(signs) {
            const grid = document.getElementById('signsGrid');
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            const filtered = signs.filter(s => 
                s.name.toLowerCase().includes(searchTerm) || 
                s.meaning.toLowerCase().includes(searchTerm)
            );
            
            grid.innerHTML = filtered.map(sign => `
                <div class="sign-card" onclick="selectSign('${sign.id}')">
                    <div class="sign-emoji">${sign.sign}</div>
                    <div class="sign-name">${sign.name}</div>
                    <div class="sign-meaning">${sign.meaning}</div>
                </div>
            `).join('');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:50px;">❌ لا توجد نتائج</div>';
            }
        }

        // اختيار إشارة
        function selectSign(id) {
            const sign = signsList.find(s => s.id === id);
            if (sign) {
                alert(`${sign.sign} - ${sign.name}\n${sign.meaning}\n${sign.description}`);
            }
        }

        // تحميل نموذج اليد
        async function loadHandModel() {
            try {
                handModel = await handpose.load();
                console.log('✅ نموذج اليد تم تحميله');
            } catch (error) {
                console.error('خطأ في تحميل نموذج اليد:', error);
            }
        }

        // بدء الكاميرا
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                
                canvas = document.getElementById('canvas');
                ctx = canvas.getContext('2d');
                
                video.addEventListener('loadeddata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                });
                
                cameraRunning = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('speakBtn').disabled = false;
                
                detectHand();
                
            } catch (error) {
                console.error('خطأ في الكاميرا:', error);
                alert('لا يمكن الوصول إلى الكاميرا. تأكد من وجود كاميرا وأذونات الوصول.');
            }
        }

        // إيقاف الكاميرا
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('speakBtn').disabled = true;
            
            if (ctx && canvas) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // كشف اليد والتعرف على الإشارة
        async function detectHand() {
            if (!cameraRunning || !video || !handModel) {
                requestAnimationFrame(detectHand);
                return;
            }
            
            try {
                const predictions = await handModel.estimateHands(video);
                
                if (ctx && canvas) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (predictions.length > 0) {
                        const hand = predictions[0];
                        const landmarks = hand.landmarks;
                        
                        // رسم النقاط
                        landmarks.forEach(point => {
                            ctx.beginPath();
                            ctx.arc(point[0], point[1], 5, 0, 2 * Math.PI);
                            ctx.fillStyle = '#00ff00';
                            ctx.fill();
                        });
                        
                        // رسم الوصلات
                        const connections = [
                            [0,1], [1,2], [2,3], [3,4], // إبهام
                            [0,5], [5,6], [6,7], [7,8], // سبابة
                            [0,9], [9,10], [10,11], [11,12], // وسطى
                            [0,13], [13,14], [14,15], [15,16], // بنصر
                            [0,17], [17,18], [18,19], [19,20] // خنصر
                        ];
                        
                        connections.forEach(conn => {
                            const p1 = landmarks[conn[0]];
                            const p2 = landmarks[conn[1]];
                            ctx.beginPath();
                            ctx.moveTo(p1[0], p1[1]);
                            ctx.lineTo(p2[0], p2[1]);
                            ctx.strokeStyle = '#ff0000';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        });
                        
                        // كشف الإشارة (تبسيط)
                        const detected = detectSignFromLandmarks(landmarks);
                        if (detected) {
                            updateDetection(detected);
                        }
                    }
                }
            } catch (error) {
                console.error('خطأ في الكشف:', error);
            }
            
            requestAnimationFrame(detectHand);
        }

        // كشف الإشارة من النقاط
        function detectSignFromLandmarks(landmarks) {
            // تبسيط: نرجع إشارة عشوائية للاختبار
            // في التطبيق الحقيقي، هنا نستخدم التعلم العميق
            
            // للعرض فقط - نرجع إشارة عشوائية
            if (Math.random() > 0.95) {
                const randomSign = signsList[Math.floor(Math.random() * signsList.length)];
                return randomSign;
            }
            return null;
        }

        // تحديث الواجهة عند اكتشاف إشارة
        function updateDetection(sign) {
            document.getElementById('detectedSign').innerHTML = sign.sign;
            document.getElementById('detectedName').innerHTML = sign.name;
            document.getElementById('detectedMeaning').innerHTML = sign.meaning;
            
            if (document.getElementById('autoSpeak').checked) {
                speak(sign.name);
            }
        }

        // نطق النص
        function speak(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        function speakDetected() {
            const name = document.getElementById('detectedName').innerHTML;
            if (name && name !== 'في انتظار الإشارة') {
                speak(name);
            }
        }

        // تبديل التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'learn') {
                displaySigns(signsList);
            }
        }

        // التدريب
        function newQuiz() {
            if (signsList.length === 0) return;
            currentQuizSign = signsList[Math.floor(Math.random() * signsList.length)];
            document.getElementById('quizSign').innerHTML = currentQuizSign.sign;
            document.getElementById('quizQuestion').innerHTML = 'ما معنى هذه الإشارة؟';
            document.getElementById('quizAnswer').value = '';
            document.getElementById('quizResult').innerHTML = '';
        }

        function checkQuiz() {
            if (!currentQuizSign) {
                newQuiz();
                return;
            }
            
            const answer = document.getElementById('quizAnswer').value.trim();
            quizTotal++;
            
            if (answer === currentQuizSign.name || answer === currentQuizSign.meaning) {
                quizScore++;
                document.getElementById('quizResult').innerHTML = '✅ إجابة صحيحة! أحسنت';
                speak('أحسنت');
            } else {
                document.getElementById('quizResult').innerHTML = `❌ إجابة خاطئة! الإجابة الصحيحة: ${currentQuizSign.name} - ${currentQuizSign.meaning}`;
            }
            
            const percentage = quizTotal > 0 ? (quizScore / quizTotal * 100).toFixed(1) : 0;
            document.getElementById('quizScore').innerHTML = `⭐ النقاط: ${quizScore} / ${quizTotal} (${percentage}%)`;
            
            newQuiz();
        }

        // بحث
        if (document.getElementById('searchInput')) {
            document.getElementById('searchInput').addEventListener('input', () => displaySigns(signsList));
        }

        // تحميل البيانات والنموذج
        loadSigns();
        loadHandModel();
    </script>
</body>
</html>
